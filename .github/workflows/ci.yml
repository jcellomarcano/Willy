name: Willy* CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PLY
      run: |
        python -m pip install --upgrade pip
        pip install ply

    - name: Build and Install Wrapper
      run: |
        make install

    - name: Run Test Suite
      run: |
        make test

    - name: Run LCA Benchmark
      run: |
        make benchmark
