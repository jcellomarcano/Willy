name: Willy* CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ply

    - name: Run Static Syntax Check
      run: |
        python -m compileall willy/

    - name: Build & Install CLI Wrapper
      run: |
        make install

    - name: Run Test Suite (Unit & Integration Tests)
      run: |
        make test

    - name: Verify LCA Optimization Suite
      run: |
        make benchmark
